name: Bug report
description: Report incorrect workbook behavior, build failures, or documentation errors.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. **Security-sensitive issues** belong in [`SECURITY.md`](https://github.com/oyebiyisunday/product-costing-vendor-sourcing/blob/main/SECURITY.md), not a public bug report.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Observed behavior (include Excel version if workbook-related).
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. …\n2. …"
    validations:
      required: false
